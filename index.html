<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dành cho cậu ❤️</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
overflow:hidden;
text-align:center;
padding:20px;

/* romantic gradient */

background:
radial-gradient(circle at 20% 20%, rgba(255,180,200,0.5), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,150,200,0.4), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(255,200,220,0.5), transparent 40%),
linear-gradient(135deg,#ffd6e8,#ffe9f3,#ffc2d1);
}

/* TEXT */

h1{
font-size:clamp(22px,6vw,34px);
color:#ff2e63;
max-width:420px;
background:white;
padding:16px 24px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
z-index:2;
}

/* BUTTONS */

.buttons{
display:flex;
gap:20px;
margin-top:28px;
z-index:2;
}

button{
padding:14px 26px;
font-size:clamp(16px,4vw,20px);
border:none;
border-radius:14px;
cursor:pointer;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
transition:0.3s;
}

/* YES */

#yes{
background:#ff4d6d;
color:white;
animation:yesGlow 2s infinite alternate;
--s:1;
transform:scale(var(--s));
}

/* NO */

#no{
background:#d9d9d9;
}

/* YES GLOW */

@keyframes yesGlow{
0%{box-shadow:0 0 10px #ff4d6d}
100%{box-shadow:0 0 25px #ff4d6d}
}

/* HEARTBEAT */

@keyframes heartbeat{
0%{transform:scale(var(--s))}
25%{transform:scale(calc(var(--s)*1.15))}
40%{transform:scale(calc(var(--s)*0.95))}
60%{transform:scale(calc(var(--s)*1.18))}
100%{transform:scale(var(--s))}
}

.heartbeat{
animation:heartbeat 0.9s infinite;
}

/* HEART RISE */

@keyframes heartRise{
0%{transform:translateY(40vh) scale(0.8);opacity:0}
20%{opacity:1}
100%{transform:translateY(-80vh) scale(1.3);opacity:0}
}

/* STAR */

.star{
position:fixed;
pointer-events:none;
animation:twinkle 2s infinite alternate;
transition:transform 0.2s linear;
}

@keyframes twinkle{
0%{opacity:0.4;transform:scale(0.8)}
100%{opacity:1;transform:scale(1.2)}
}

/* FLOWERS */

.flower{
position:fixed;
top:-20px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(120vh)}
}

/* SHAKE */

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(-8px)}
50%{transform:translate(8px)}
75%{transform:translate(-8px)}
100%{transform:translate(0)}
}

.shake{
animation:shake 0.5s;
}

/* POPUP */

.popup{
position:fixed;
bottom:60px;
left:50%;
transform:translateX(-50%);
background:white;
padding:18px 24px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
font-size:18px;
z-index:10;
display:none;
pointer-events:none;
animation:popupShow 0.4s ease;
}

@keyframes popupShow{
0%{opacity:0;transform:translate(-50%,20px)}
100%{opacity:1;transform:translate(-50%,0)}
}

</style>

</head>

<body>

<h1 id="text"></h1>

<div class="buttons">
<button id="yes">Yes</button>
<button id="no">No</button>
</div>

<div class="popup" id="popup">
💌 Hint: Tớ thích cậu lâu rồi đó ❤️
</div>

<audio id="music" src="love.mp3"></audio>

<script>

/* QUESTION */

const message="Miee à cậu đồng ý làm người yêu tớ nhé ?"
let i=0
const text=document.getElementById("text")

function typing(){
if(i<message.length){
text.innerHTML+=message.charAt(i)
i++
setTimeout(typing,50)
}
}
typing()

/* STARS */

const icons=["⭐","✨","💫","🌟","💗"]
let stars=[]

for(let i=0;i<35;i++){

const star=document.createElement("div")
star.innerHTML=icons[Math.floor(Math.random()*icons.length)]
star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"
star.style.fontSize=(Math.random()*20+16)+"px"

document.body.appendChild(star)
stars.push(star)
}

/* PARALLAX */

document.addEventListener("mousemove",(e)=>{

let x=(e.clientX/window.innerWidth-0.5)*20
let y=(e.clientY/window.innerHeight-0.5)*20

stars.forEach(star=>{
star.style.transform=`translate(${x}px,${y}px)`
})

})

document.addEventListener("touchmove",(e)=>{

let t=e.touches[0]

let x=(t.clientX/window.innerWidth-0.5)*20
let y=(t.clientY/window.innerHeight-0.5)*20

stars.forEach(star=>{
star.style.transform=`translate(${x}px,${y}px)`
})

})

/* FLOWERS */

setInterval(()=>{

const flower=document.createElement("div")

flower.innerHTML="🌸"
flower.className="flower"

flower.style.left=Math.random()*100+"vw"
flower.style.fontSize=(Math.random()*16+14)+"px"
flower.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(flower)

setTimeout(()=>flower.remove(),9000)

},800)

/* HEART LOOP BACKGROUND */

function heartLoop(){

for(let i=0;i<20;i++){

const heart=document.createElement("div")

heart.innerHTML="💖"
heart.style.position="fixed"
heart.style.left=Math.random()*100+"vw"
heart.style.bottom="-30px"

heart.style.fontSize=(Math.random()*24+18)+"px"

let duration=Math.random()*4+6

heart.style.animation="heartRise "+duration+"s ease-out"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},duration*1000)

}

}

setInterval(()=>{
heartLoop()
},3000)

/* BUTTON LOGIC */

let size=1
let noCount=0

const yes=document.getElementById("yes")
const no=document.getElementById("no")

const noTexts=[
"Really?",
"Suy nghĩ kĩ lại đi mà",
"nèeeeeee",
"Cứng đầu hả",
"Trời oii",
"Pleaseeeee",
"Đừng bấm No nữaaaaa",
"Thiệt luôn hả",
"Cơ hội cuối đó!"
]

/* YES CLICK */

yes.onclick=function(){

const music=document.getElementById("music")

/* bắt đầu từ giây 7 */

music.currentTime=7

/* volume ban đầu */

music.volume=0

music.play()

/* fade in */

let vol=0

let fade=setInterval(()=>{

if(vol<1){

vol+=0.03
music.volume=vol

}else{

clearInterval(fade)

}

},120)

/* message */

const yesMessage=" Yayyy ❤️ Tớ biết mà!!! Từ giờ cậu là em bé của tớ rồi! Tớ sẽ trở thành anh iu đẹp trai, thông minh 6 múi , tinh tế, một bờ vai để dựa, một người đồng hành , một người bên cạnh cậu , quan tâm cậu để cậu trở thành em bé hạnh phúc nhất cái quả địa cầu này!! I luv youuuu ❤️❤️❤️!!!"

text.innerHTML=""

let j=0

function typingYes(){

if(j<yesMessage.length){

text.innerHTML+=yesMessage.charAt(j)

j++

setTimeout(typingYes,120)

}

}

typingYes()

yes.style.display="none"
no.style.display="none"

}
/* NO CLICK */

no.onclick=function(){

noCount++

if(noCount==5){

let popup=document.getElementById("popup")

popup.style.display="block"

setTimeout(()=>{
popup.style.display="none"
},4000)

}

if(noCount>=6){
yes.classList.add("heartbeat")
}

if(noCount>=3){
let index=Math.min(noCount-3,noTexts.length-1)
no.innerText=noTexts[index]
}

if(noCount>=5){

document.body.classList.add("shake")

setTimeout(()=>{
document.body.classList.remove("shake")
},500)

}

if(noCount>=7){

let scale=1-(noCount-6)*0.15

if(scale<0.15){
scale=0.15
}

no.style.transform="scale("+scale+")"

}

if(noCount>=11){
no.style.display="none"
}

const w=no.offsetWidth
const h=no.offsetHeight

let x=Math.random()*(window.innerWidth-w)
let y=Math.random()*(window.innerHeight-h)

no.style.position="fixed"
no.style.left=x+"px"
no.style.top=y+"px"

size+=0.25
yes.style.setProperty("--s",size)

}

</script>

</body>
</html>
