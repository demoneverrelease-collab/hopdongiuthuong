<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dành cho cậu ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ffd6e8,#ffe9f3,#ffc2d1);
overflow:hidden;
text-align:center;
padding:20px;
}

h1{
font-size:clamp(22px,5vw,32px);
color:#ff2e63;
max-width:500px;
position:relative;
z-index:2;
}

.buttons{
display:flex;
gap:20px;
margin-top:30px;
position:relative;
z-index:2;
}

button{
padding:14px 28px;
font-size:clamp(16px,4vw,22px);
border:none;
border-radius:14px;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.3s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#d9d9d9;
}

.heart{
position:fixed;
top:100vh;
animation:bay 5s linear;
pointer-events:none;
z-index:0;
}

@keyframes bay{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-120vh) scale(1.6);opacity:0;}
}

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(-8px)}
50%{transform:translate(8px)}
75%{transform:translate(-8px)}
100%{transform:translate(0)}
}

.shake{
animation:shake 0.5s;
}

</style>

</head>

<body>

<h1 id="text">Miee à cậu đồng ý làm người yêu tớ nhé ?</h1>

<div class="buttons">
<button id="yes">Yes</button>
<button id="no">No</button>
</div>

<audio id="music" src="Rapitalove EP Tay To - RPT MCK x RPT PhongKhin (Prod. by RPT PhongKhin) [Official Lyric Video].mp3"></audio>
  
<script>

let size = 1
let noCount = 0

const yes = document.getElementById("yes")
const no = document.getElementById("no")

const noTexts = [
"Really?",
"Cậu chắc chưa",
"Suy nghĩ lại kĩ đi mà",
"Cứng đầu hả",
"Trời oii",
"Pleaseeeee",
"Cơ hội cuối!",
"Thiệt luôn hả"
]




/* YES */

yes.onclick=function(){

document.getElementById("music").play()

document.getElementById("text").innerText =
"Yayyy ❤️ Tớ biết mà!!! Từ giờ cậu là em bé của tớ rồi! Tớ sẽ trở thành anh iu đẹp trai, thông minh 6 múi , tinh tế, một bờ vai, một người đồng hành , một người bên cạnh cậu , quan tâm cậu  để cậu trở thành em bé hạnh phúc nhất cái quả địa cầu này!! i luv youuuu❤️❤️❤️!!!"

yes.style.display="none"
no.style.display="none"

/* confetti nổ */

for(let i=0;i<120;i++){

const conf=document.createElement("div")

conf.innerHTML="💖"
conf.style.position="fixed"
conf.style.left=Math.random()*100+"vw"
conf.style.top=Math.random()*100+"vh"
conf.style.fontSize=(Math.random()*30+20)+"px"

conf.style.animation="bay 4s linear"

document.body.appendChild(conf)

setTimeout(()=>{
conf.remove()
},4000)

}

/* mưa tim */

setInterval(function(){

const heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(Math.random()*40+20)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},5000)

},80)

}


/* NO */

no.onclick=function(){

noCount++

/* đổi text sau 3 lần */

if(noCount>=3){
let i=Math.min(noCount-3,noTexts.length-1)
no.innerText=noTexts[i]
}

/* rung màn hình */

if(noCount>=5){
document.body.classList.add("shake")

setTimeout(()=>{
document.body.classList.remove("shake")
},500)
}

/* nhỏ dần */

if(noCount>=7){

let scale=1-(noCount-6)*0.15

if(scale<0.15){
scale=0.15
}

no.style.transform="scale("+scale+")"
}

/* biến mất */

if(noCount>=11){
no.style.display="none"
}

/* di chuyển nhưng vẫn nằm trong màn hình */

const buttonWidth = no.offsetWidth
const buttonHeight = no.offsetHeight

let x = Math.random() * (window.innerWidth - buttonWidth)
let y = Math.random() * (window.innerHeight - buttonHeight)

no.style.position="fixed"
no.style.left=x+"px"
no.style.top=y+"px"

/* yes to dần */

size+=0.25
yes.style.transform="scale("+size+")"

}


</script>

</body>
</html>
