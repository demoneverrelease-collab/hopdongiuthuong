<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dành cho cậu ❤️</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:linear-gradient(135deg,#ffd6e8,#ffe9f3,#ffc2d1);
overflow:hidden;
text-align:center;
padding:20px;
}

/* TEXT */

h1{
font-size:clamp(22px,6vw,34px);
color:#ff2e63;
max-width:420px;
background:white;
padding:16px 24px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
z-index:2;
}

/* BUTTONS */

.buttons{
display:flex;
gap:20px;
margin-top:28px;
z-index:2;
}

button{
padding:14px 26px;
font-size:clamp(16px,4vw,20px);
border:none;
border-radius:14px;
cursor:pointer;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
transition:0.3s;
}

#yes{
background:#ff4d6d;
color:white;
animation:yesGlow 2s infinite alternate;
}

#no{
background:#d9d9d9;
}

/* YES GLOW */

@keyframes yesGlow{
0%{box-shadow:0 0 10px #ff4d6d;}
100%{box-shadow:0 0 25px #ff4d6d;}
}

/* HEART */

@keyframes heartFly{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-130vh) scale(1.8);opacity:0;}
}

/* SHAKE */

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(-8px)}
50%{transform:translate(8px)}
75%{transform:translate(-8px)}
100%{transform:translate(0)}
}

.shake{
animation:shake 0.5s;
}

/* STARS */

.star{
position:fixed;
animation:twinkle 2s infinite alternate;
pointer-events:none;
}

@keyframes twinkle{
0%{opacity:0.3;transform:scale(0.8);}
100%{opacity:1;transform:scale(1.2);}
}

/* FLOWERS */

.flower{
position:fixed;
top:-20px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(-20px);}
100%{transform:translateY(120vh);}
}

/* POPUP */

.popup{
position:fixed;
bottom:60px;
left:50%;
transform:translateX(-50%);
background:white;
padding:18px 24px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
font-size:18px;
z-index:10;
display:none;
animation:popupShow 0.4s ease;
}

@keyframes popupShow{
0%{opacity:0;transform:translate(-50%,20px);}
100%{opacity:1;transform:translate(-50%,0);}
}

@media(max-width:500px){

h1{
font-size:22px;
}

}

</style>

</head>

<body>

<h1 id="text"></h1>

<div class="buttons">
<button id="yes">Yes</button>
<button id="no">No</button>
</div>

<div class="popup" id="popup">
💌 Tớ thích cậu lâu rồi đó ❤️
</div>

<audio id="music" src="love.mp3"></audio>

<script>

/* TYPING QUESTION */

const message="Miee à cậu đồng ý làm người yêu tớ nhé ?"

let i=0
const text=document.getElementById("text")

function typing(){

if(i<message.length){
text.innerHTML+=message.charAt(i)
i++
setTimeout(typing,50)
}

}

typing()

/* STARS */

const icons=["⭐","✨","💫","🌟","🧸","💗","🌸"]

for(let i=0;i<30;i++){

const star=document.createElement("div")

star.innerHTML=icons[Math.floor(Math.random()*icons.length)]

star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"
star.style.fontSize=(Math.random()*20+16)+"px"

document.body.appendChild(star)

}

/* FLOWERS */

setInterval(()=>{

const flower=document.createElement("div")

flower.innerHTML="🌸"

flower.className="flower"

flower.style.left=Math.random()*100+"vw"
flower.style.fontSize=(Math.random()*16+14)+"px"
flower.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(flower)

setTimeout(()=>flower.remove(),9000)

},800)

/* BUTTON LOGIC */

let size=1
let noCount=0

const yes=document.getElementById("yes")
const no=document.getElementById("no")

const noTexts=[
"Really?",
"Suy nghĩ kĩ lại đi mà",
"nèeeeeee",
"Cứng đầu hả",
"Trời oii",
"Pleaseeeee",
"Đừng bấm No nữaaaaa",
"Thiệt luôn hả",
"Cơ hội cuối đó!"
]

/* YES CLICK */

yes.onclick=function(){

const music=document.getElementById("music")

music.currentTime=7
music.volume=0
music.play()

let vol=0

let fade=setInterval(()=>{

if(vol<1){
vol+=0.05
music.volume=vol
}else{
clearInterval(fade)
}

},200)

/* TYPING LOVE MESSAGE */

const yesMessage="Yayyy ❤️ Tớ biết mà!!! Từ giờ cậu là em bé của tớ rồi! Tớ sẽ trở thành anh iu đẹp trai, thông minh 6 múi , tinh tế, một bờ vai để dựa, một người đồng hành , một người bên cạnh cậu , quan tâm cậu để cậu trở thành em bé hạnh phúc nhất cái quả địa cầu này!! I luv youuuu ❤️❤️❤️!!!"

text.innerHTML=""

let j=0

function typingYes(){

if(j<yesMessage.length){
text.innerHTML+=yesMessage.charAt(j)
j++
setTimeout(typingYes,40)
}

}

typingYes()

yes.style.display="none"
no.style.display="none"

/* HEARTS */

for(let i=0;i<100;i++){

const heart=document.createElement("div")

heart.innerHTML="💖"

heart.style.position="fixed"
heart.style.left=Math.random()*100+"vw"
heart.style.top="100vh"

heart.style.fontSize=(Math.random()*30+18)+"px"
heart.style.animation="heartFly 4s linear"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)

}

}

/* NO CLICK */

no.onclick=function(){

noCount++

if(noCount==5){
document.getElementById("popup").style.display="block"
}

if(noCount>=3){
let index=Math.min(noCount-3,noTexts.length-1)
no.innerText=noTexts[index]
}

if(noCount>=5){

document.body.classList.add("shake")

setTimeout(()=>{
document.body.classList.remove("shake")
},500)

}

if(noCount>=7){

let scale=1-(noCount-6)*0.15

if(scale<0.15){
scale=0.15
}

no.style.transform="scale("+scale+")"

}

if(noCount>=11){
no.style.display="none"
}

const w=no.offsetWidth
const h=no.offsetHeight

let x=Math.random()*(window.innerWidth-w)
let y=Math.random()*(window.innerHeight-h)

no.style.position="fixed"
no.style.left=x+"px"
no.style.top=y+"px"

size+=0.25
yes.style.transform="scale("+size+")"

}

</script>

</body>
</html>
